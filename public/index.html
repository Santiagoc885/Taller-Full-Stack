<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoMarket Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #080c14;
    --bg2:      #0d1220;
    --bg3:      #131929;
    --border:   #1e2d45;
    --accent:   #e63946;
    --accent2:  #ff6b6b;
    --teal:     #2a9d8f;
    --gold:     #e9c46a;
    --blue:     #457b9d;
    --text:     #d4dce8;
    --muted:    #6b7d91;
    --white:    #f0f4f8;
    --font:     'DM Sans', sans-serif;
    --mono:     'JetBrains Mono', monospace;
    --display:  'Bebas Neue', sans-serif;
    --radius:   6px;
    --shadow:   0 4px 24px rgba(0,0,0,.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 230px; min-width: 230px; background: var(--bg2);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 0; overflow: hidden;
  }
  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo h1 {
    font-family: var(--display); font-size: 1.9rem; letter-spacing: 2px;
    color: var(--white); line-height: 1;
  }
  .sidebar-logo h1 span { color: var(--accent); }
  .sidebar-logo p { font-size: .72rem; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }

  .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
  .nav-section { font-size: .65rem; font-weight: 600; letter-spacing: 2px; color: var(--muted);
    padding: 8px 8px 4px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius);
    cursor: pointer; color: var(--text); font-size: .88rem; font-weight: 400;
    transition: all .2s; margin-bottom: 2px; border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--bg3); color: var(--white); }
  .nav-item.active { background: rgba(230,57,70,.12); color: var(--accent); border-color: rgba(230,57,70,.25); }
  .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--accent); color: #fff;
    font-size: .65rem; font-weight: 600; padding: 2px 6px; border-radius: 20px;
  }

  .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
  .api-status { display: flex; align-items: center; gap: 8px; font-size: .75rem; color: var(--muted); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .topbar-title { font-family: var(--display); font-size: 1.5rem; letter-spacing: 2px; color: var(--white); }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    padding: 8px 18px; border-radius: var(--radius); border: none; cursor: pointer;
    font-family: var(--font); font-size: .83rem; font-weight: 600; letter-spacing: .5px;
    transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary   { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost     { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg3); color: var(--white); border-color: var(--blue); }
  .btn-teal      { background: var(--teal); color: #fff; }
  .btn-teal:hover { opacity:.85; }
  .btn-sm        { padding: 5px 12px; font-size: .78rem; }
  .btn-danger    { background: transparent; color: var(--accent); border: 1px solid rgba(230,57,70,.3); }
  .btn-danger:hover { background: rgba(230,57,70,.1); }

  .content { flex: 1; overflow-y: auto; padding: 28px; }

  /* ── STATS ROW ── */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; position: relative; overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--blue); }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.red::before  { background: var(--accent); }
  .stat-card.teal::before { background: var(--teal); }
  .stat-card.gold::before { background: var(--gold); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .stat-value { font-family: var(--display); font-size: 2rem; color: var(--white); letter-spacing: 1px; }
  .stat-sub   { font-size: .75rem; color: var(--muted); margin-top: 4px; }
  .stat-icon  { position: absolute; right: 18px; top: 18px; font-size: 1.8rem; opacity: .15; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  .table-header {
    padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .table-title { font-weight: 600; color: var(--white); font-size: .95rem; }
  .search-input {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 7px 14px; font-family: var(--font); font-size: .83rem; width: 220px;
    transition: border-color .2s; outline: none;
  }
  .search-input:focus { border-color: var(--blue); }
  .search-input::placeholder { color: var(--muted); }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--bg3); }
  th {
    padding: 11px 16px; text-align: left; font-size: .7rem; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  td { padding: 13px 16px; font-size: .85rem; border-bottom: 1px solid rgba(30,45,69,.5); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: rgba(255,255,255,.02); }

  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .7rem; font-weight: 600;
    letter-spacing: .5px;
  }
  .badge-green  { background: rgba(42,157,143,.15); color: var(--teal); border: 1px solid rgba(42,157,143,.3); }
  .badge-red    { background: rgba(230,57,70,.12); color: var(--accent); border: 1px solid rgba(230,57,70,.3); }
  .badge-gold   { background: rgba(233,196,106,.12); color: var(--gold); border: 1px solid rgba(233,196,106,.3); }

  .mono { font-family: var(--mono); font-size: .82rem; }
  .text-muted { color: var(--muted); }
  .text-accent { color: var(--accent); }
  .text-teal   { color: var(--teal); }
  .text-gold   { color: var(--gold); }
  .text-white  { color: var(--white); font-weight: 600; }
  .actions { display: flex; gap: 6px; }

  /* ── MODAL ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
    width: min(560px, 95vw); max-height: 90vh; overflow-y: auto;
    transform: translateY(20px); transition: transform .25s;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .overlay.open .modal { transform: translateY(0); }
  .modal-head {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 { font-family: var(--display); font-size: 1.3rem; letter-spacing: 1.5px; color: var(--white); }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }
  .modal-close:hover { color: var(--white); }
  .modal-body { padding: 24px; }
  .modal-foot {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px;
  }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: .75rem; font-weight: 600; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  input, select, textarea {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 10px 14px; font-family: var(--font); font-size: .88rem;
    transition: border-color .2s; outline: none; width: 100%;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); color: var(--white); }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  select option { background: var(--bg2); }
  textarea { resize: vertical; min-height: 70px; }

  .form-divider {
    grid-column: 1/-1; border: none; border-top: 1px solid var(--border);
    margin: 4px 0;
  }
  .info-box {
    grid-column: 1/-1; background: rgba(42,157,143,.08); border: 1px solid rgba(42,157,143,.2);
    border-radius: var(--radius); padding: 12px 16px; font-size: .82rem; color: var(--teal);
  }
  .ganancia-preview {
    grid-column: 1/-1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .ganancia-row { display: flex; justify-content: space-between; font-size: .83rem; margin-bottom: 4px; }
  .ganancia-total {
    display: flex; justify-content: space-between; font-weight: 700;
    font-family: var(--display); font-size: 1.1rem; letter-spacing: 1px;
    padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px;
  }

  /* ── EMPTY STATE ── */
  .empty { padding: 48px; text-align: center; color: var(--muted); }
  .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .empty p { font-size: .9rem; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 18px; font-size: .84rem; min-width: 280px; max-width: 360px;
    display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow);
    animation: slideIn .3s ease; border-left: 3px solid var(--teal);
  }
  .toast.error { border-left-color: var(--accent); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── HISTORIAL DETAIL ── */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-item { background: var(--bg3); border-radius: var(--radius); padding: 12px 16px; }
  .detail-item .lbl { font-size: .68rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .detail-item .val { font-size: .9rem; color: var(--white); font-weight: 500; }
  .section-tag {
    display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
    border-radius: 20px; font-size: .72rem; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .tag-compra { background: rgba(69,123,157,.15); color: var(--blue); border: 1px solid rgba(69,123,157,.3); }
  .tag-venta  { background: rgba(231,111,81,.15);  color: #e76f51;    border: 1px solid rgba(231,111,81,.3); }

  @media(max-width:768px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .sidebar { width: 200px; min-width: 200px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>AUTO<span>MARKET</span></h1>
      <p>SISTEMA DE GESTIÓN</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" onclick="showSection('dashboard')" id="nav-dashboard">
        <span class="icon">📊</span> Dashboard
      </div>

      <div class="nav-section" style="margin-top:12px">Inventario</div>
      <div class="nav-item" onclick="showSection('autos')" id="nav-autos">
        <span class="icon">🚗</span> Vehículos
        <span class="nav-badge" id="badge-autos">0</span>
      </div>

      <div class="nav-section" style="margin-top:12px">Personas</div>
      <div class="nav-item" onclick="showSection('personas')" id="nav-personas">
        <span class="icon">👥</span> Personas
      </div>

      <div class="nav-section" style="margin-top:12px">Operaciones</div>
      <div class="nav-item" onclick="showSection('compras')" id="nav-compras">
        <span class="icon">📥</span> Compras
      </div>
      <div class="nav-item" onclick="showSection('ventas')" id="nav-ventas">
        <span class="icon">📤</span> Ventas
      </div>
      <div class="nav-item" onclick="showSection('rentabilidad')" id="nav-rentabilidad">
        <span class="icon">💰</span> Rentabilidad
      </div>
      <div class="nav-item" onclick="showSection('historial')" id="nav-historial">
        <span class="icon">📋</span> Historial
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="api-status">
        <div class="status-dot" id="api-dot"></div>
        <span id="api-text">Conectando API...</span>
      </div>
      <div style="font-size:.65rem;color:var(--muted);margin-top:4px;font-family:var(--mono)">
        localhost:3000
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">DASHBOARD</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>

    <div class="content" id="content">
      <!-- rendered by JS -->
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-head">
      <h3 id="modal-title">TÍTULO</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════
//  CONFIG & UTILS
// ═══════════════════════════════════════════════
const API = 'http://localhost:3000/api';
let currentSection = 'dashboard';

const fmt = n => n != null ? new Intl.NumberFormat('es-CO', {style:'currency',currency:'COP',minimumFractionDigits:0}).format(n) : '—';
const fmtDate = d => d ? new Date(d).toLocaleDateString('es-CO') : '—';
const esc = s => String(s||'').replace(/[<>"']/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function api(path, opts={}) {
  try {
    const r = await fetch(API+path, { headers:{'Content-Type':'application/json'}, ...opts });
    const j = await r.json();
    if (!r.ok) throw new Error(j.message || 'Error de servidor');
    return j;
  } catch(e) { throw e; }
}

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'toast' + (type==='error' ? ' error' : '');
  el.innerHTML = `<span>${type==='ok'?'✅':'❌'}</span>${esc(msg)}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function openModal(title, bodyHTML, footHTML) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML  = bodyHTML;
  document.getElementById('modal-foot').innerHTML  = footHTML;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('modal-overlay')) closeModal();
});

function setNav(s) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const el = document.getElementById('nav-'+s);
  if(el) el.classList.add('active');
}

// ═══════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════
async function renderDashboard() {
  document.getElementById('page-title').textContent = 'DASHBOARD';
  document.getElementById('topbar-actions').innerHTML = '';
  const content = document.getElementById('content');
  content.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center">Cargando estadísticas…</div>';

  try {
    const [statsR, autosR, ventasR] = await Promise.all([
      api('/autos/stats'),
      api('/autos'),
      api('/ventas')
    ]);
    const s = statsR.data;
    const recentVentas = ventasR.data.slice(0,5);

    content.innerHTML = `
      <div class="stats-row">
        <div class="stat-card red">
          <div class="stat-label">Total Vehículos</div>
          <div class="stat-value">${s.total_autos}</div>
          <div class="stat-sub">${s.disponibles} disponibles · ${s.vendidos} vendidos</div>
          <div class="stat-icon">🚗</div>
        </div>
        <div class="stat-card teal">
          <div class="stat-label">Total Invertido</div>
          <div class="stat-value">${fmt(s.total_invertido)}</div>
          <div class="stat-sub">En compras de vehículos</div>
          <div class="stat-icon">📥</div>
        </div>
        <div class="stat-card gold">
          <div class="stat-label">Total Recaudado</div>
          <div class="stat-value">${fmt(s.total_recaudado)}</div>
          <div class="stat-sub">En ventas realizadas</div>
          <div class="stat-icon">📤</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-label">Ganancia Total</div>
          <div class="stat-value" style="color:${parseFloat(s.ganancia_total)>=0?'var(--teal)':'var(--accent)'}">${fmt(s.ganancia_total)}</div>
          <div class="stat-sub">Rentabilidad neta</div>
          <div class="stat-icon">💰</div>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Últimas ventas</div>
          <button class="btn btn-ghost btn-sm" onclick="showSection('ventas')">Ver todas →</button>
        </div>
        ${recentVentas.length ? `
        <table>
          <thead><tr>
            <th>Vehículo</th><th>Comprador</th>
            <th>Precio Venta</th><th>Ganancia</th><th>Fecha</th>
          </tr></thead>
          <tbody>
            ${recentVentas.map(v=>`<tr>
              <td><span class="text-white">${esc(v.marca)} ${esc(v.modelo)}</span><br><span class="mono text-muted">${esc(v.placa)}</span></td>
              <td>${esc(v.comprador_nombre)}</td>
              <td class="mono">${fmt(v.precio_venta)}</td>
              <td class="mono ${parseFloat(v.ganancia)>=0?'text-teal':'text-accent'}">${fmt(v.ganancia)}</td>
              <td class="text-muted">${fmtDate(v.fecha_venta)}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<div class="empty"><div class="icon">📤</div><p>Sin ventas registradas aún</p></div>'}
      </div>`;
  } catch(e) {
    content.innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>${esc(e.message)}</p></div>`;
  }
}

// ═══════════════════════════════════════════════
//  PERSONAS
// ═══════════════════════════════════════════════
async function renderPersonas() {
  document.getElementById('page-title').textContent = 'PERSONAS';
  document.getElementById('topbar-actions').innerHTML =
    `<button class="btn btn-primary" onclick="openPersonaModal()">+ Nueva Persona</button>`;

  const content = document.getElementById('content');
  content.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center">Cargando…</div>';
  try {
    const { data } = await api('/personas');
    content.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Personas registradas (${data.length})</div>
          <input class="search-input" placeholder="Buscar…" oninput="filterTable(this,'tbl-personas')"/>
        </div>
        <table id="tbl-personas">
          <thead><tr><th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Email</th><th>Acciones</th></tr></thead>
          <tbody>
            ${data.length ? data.map(p=>`<tr>
              <td><span class="text-white">${esc(p.nombre)} ${esc(p.apellido)}</span></td>
              <td class="mono">${esc(p.cedula)}</td>

function openImportCSVUIModal() {
  openModal('IMPORTAR VEHÍCULOS DESDE CSV', `
    <div class="form-grid">
      <div class="info-box">
        <strong>📋 Formato requerido:</strong><br>
        El archivo CSV debe tener las siguientes columnas:<br>
        <code>placa, marca, modelo, anio,</code><br><br>
        <strong>Nota:</strong> Las placas duplicadas serán ignoradas.
      </div>
      <div class="form-group full">
        <label>Seleccionar archivo CSV *</label>
        <input type="file" id="csv-file" accept=".csv" style="padding: 8px;">
      </div>
      <div class="form-group full" id="csv-preview" style="display:none;">
        <div class="table-wrap" style="max-height: 200px; overflow-y: auto;">
          <table>
            <thead><tr><th>Vista previa</th></tr></thead>
            <tbody id="csv-preview-body"></tbody>
          </table>
        </div>
      </div>
    </div>`, `
    <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" id="btn-import-csv" onclick="importCSV()" disabled>📥 Importar</button>`);

  // Add file input listener
  document.getElementById('csv-file').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const btn = document.getElementById('btn-import-csv');
    if (file) {
      btn.disabled = false;
      // Show preview
      const reader = new FileReader();
      reader.onload = function(e) {
        const lines = e.target.result.split('\n').filter(l => l.trim()).slice(0, 6);
        const previewBody = document.getElementById('csv-preview-body');
        previewBody.innerHTML = lines.map(l => `<tr><td class="mono">${esc(l)}</td></tr>`).join('');
        document.getElementById('csv-preview').style.display = 'block';
      };
      reader.readAsText(file);
    } else {
      btn.disabled = true;
    }
  });
}

async function importCSV() {
  const fileInput = document.getElementById('csv-file');
  const file = fileInput.files[0];
  
  if (!file) {
    toast('Por favor selecciona un archivo CSV', 'error');
    return;
  }

  const formData = new FormData();
  formData.append('archivo', file);

  const btn = document.getElementById('btn-import-csv');
  btn.disabled = true;
  btn.innerHTML = '⏳ Importando...';

  try {
    const response = await fetch(API + '/autos/import', {
      method: 'POST',
      body: formData
    });
    
    const result = await response.json();
    
    if (!response.ok) {
      throw new Error(result.message || 'Error en la importación');
    }

    toast(result.message);
    closeModal();
    renderAutos(); // Refresh the list
    
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '📥 Importar';
  }
}

function updateGanancia() {
  const sel = document.getElementById('f-compra');
  const opt = sel && sel.options[sel.selectedIndex];
  const pCompra = opt ? parseFloat(opt.dataset.precio||0) : 0;
  const pVenta  = parseFloat(document.getElementById('f-pventa')?.value||0);
  const ganancia = pVenta - pCompra;
  if(document.getElementById('g-compra')) document.getElementById('g-compra').textContent = pCompra ? fmt(pCompra) : '—';
  if(document.getElementById('g-venta'))  document.getElementById('g-venta').textContent  = pVenta  ? fmt(pVenta)  : '—';
  if(document.getElementById('g-total')) {
    const el = document.getElementById('g-total');
    el.textContent = pVenta && pCompra ? fmt(ganancia) : '—';
    el.className = ganancia >= 0 ? 'text-teal' : 'text-accent';
  }
}

          <thead><tr><th>Vehículo</th><th>Comprador</th><th>Precio Compra</th><th>Precio Venta</th><th>Ganancia</th><th>% Ganancia</th><th>Fecha</th></tr></thead>
          <tbody>
            ${data.length ? data.map(v=>`<tr>
              <td class="text-white">${esc(v.vehiculo)}<br><span class="mono text-gold" style="font-size:.72rem">${esc(v.placa)}</span></td>
              <td>${esc(v.comprador)}</td>
              <td class="mono text-muted">${fmt(v.precio_compra)}</td>
              <td class="mono">${fmt(v.precio_venta)}</td>
              <td class="mono text-white ${parseFloat(v.ganancia)>=0?'text-teal':'text-accent'}">${fmt(v.ganancia)}</td>
              <td><span class="badge ${parseFloat(v.porcentaje_ganancia)>=0?'badge-green':'badge-red'}">${v.porcentaje_ganancia}%</span></td>
              <td class="text-muted">${fmtDate(v.fecha_venta)}</td>
            </tr>`).join('') : '<tr><td colspan="7"><div class="empty"><p>Sin ventas para calcular rentabilidad</p></div></td></tr>'}
          </tbody>
        </table>
      </div>`;
  } catch(e) { toast(e.message,'error'); }
}

// ═══════════════════════════════════════════════
//  HISTORIAL
// ═══════════════════════════════════════════════
async function renderHistorial() {
  document.getElementById('page-title').textContent = 'HISTORIAL COMPLETO';
  document.getElementById('topbar-actions').innerHTML = '';
  const content = document.getElementById('content');
  content.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center">Cargando…</div>';
  try {
    const { data } = await api('/autos');
    content.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Trazabilidad de vehículos (${data.length})</div>
          <input class="search-input" placeholder="Placa, marca…" oninput="filterTable(this,'tbl-hist')"/>
        </div>
        <table id="tbl-hist">
          <thead><tr><th>Placa</th><th>Vehículo</th><th>Estado</th><th>Compra</th><th>Vendedor → Empresa</th><th>Venta</th><th>Empresa → Comprador</th><th>Ganancia</th></tr></thead>
          <tbody>
            ${data.map(a=>`<tr>
              <td class="mono text-gold">${esc(a.placa)}</td>
              <td class="text-white">${esc(a.marca)} ${esc(a.modelo)}<br><span class="text-muted" style="font-size:.72rem">${esc(a.anio)} · ${esc(a.color||'')}</span></td>
              <td><span class="badge ${a.estado==='disponible'?'badge-green':'badge-red'}">${a.estado}</span></td>
              <td class="mono text-muted">${a.precio_compra ? fmt(a.precio_compra) : '—'}</td>
              <td>${a.vendedor_nombre ? esc(a.vendedor_nombre) : '<span class="text-muted">—</span>'}</td>
              <td class="mono text-muted">${a.precio_venta ? fmt(a.precio_venta) : '—'}</td>
              <td>${a.comprador_nombre ? esc(a.comprador_nombre) : '<span class="text-muted">—</span>'}</td>
              <td class="mono ${a.ganancia!=null?(parseFloat(a.ganancia)>=0?'text-teal':'text-accent'):''}">${a.ganancia!=null ? fmt(a.ganancia) : '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) { toast(e.message,'error'); }
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function filterTable(input, tableId) {
  const val = input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(val) ? '' : 'none';
  });
}

function showSection(s) {
  currentSection = s;
  setNav(s);
  const map = {
    dashboard: renderDashboard,
    personas:  renderPersonas,
    autos:     renderAutos,
    compras:   renderCompras,
    ventas:    renderVentas,
    rentabilidad: renderRentabilidad,
    historial: renderHistorial,
  };
  if(map[s]) map[s]();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function checkAPIHealth() {
  try {
    await api('/health');
    document.getElementById('api-dot').style.background = 'var(--teal)';
    document.getElementById('api-text').textContent = 'API conectada';
  } catch {
    document.getElementById('api-dot').style.background = 'var(--accent)';
    document.getElementById('api-dot').style.animation = 'none';
    document.getElementById('api-text').textContent = 'API desconectada';
  }
}

checkAPIHealth();
showSection('dashboard');
</script>
</body>
</html>
